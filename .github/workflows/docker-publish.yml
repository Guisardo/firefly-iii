name: Docker Hub publish shared-admin

on:
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub environment that approves this image publication.
        required: true
        type: choice
        options:
          - shared-admin-staging
          - shared-admin-production
      vulnerability_gate:
        description: Vulnerability severity gate for image publication.
        required: true
        type: choice
        default: high-critical
        options:
          - high-critical
          - critical
          - advisory

run-name: Docker Hub shared-admin image from ${{ github.ref_name }} by @${{ github.actor }}

permissions:
  contents: read
  id-token: write

concurrency:
  group: docker-publish-shared-admin-${{ github.ref_name }}
  cancel-in-progress: false

env:
  IMAGE_REPOSITORY: guisardo/firefly-iii
  IMMUTABLE_TAG: shared-admin-${{ github.sha }}
  MOVING_TAG: shared-admin-latest

jobs:
  publish:
    name: Build, check, and publish image
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: ${{ inputs.environment }}

    steps:
      - name: Validate dispatch scope and secrets
        env:
          DEPLOY_ENVIRONMENT: ${{ inputs.environment }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ "$GITHUB_REPOSITORY" != "Guisardo/firefly-iii" ]; then
            echo "::error::This workflow may only publish from Guisardo/firefly-iii."
            exit 1
          fi

          case "$GITHUB_REF" in
            refs/heads/main)
              ;;
            refs/heads/develop|refs/heads/feature/shared-administration-access)
              if [ "$DEPLOY_ENVIRONMENT" = "shared-admin-production" ]; then
                echo "::error::Production image publication must run from main."
                exit 1
              fi
              ;;
            *)
              echo "::error::Approved refs are main, develop, and feature/shared-administration-access."
              exit 1
              ;;
          esac

          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "::error::DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets are required."
            exit 1
          fi

      # actions/checkout@v6
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      # docker/setup-buildx-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Log in to Docker Hub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          printf '%s' "$DOCKERHUB_TOKEN" | docker login --username "$DOCKERHUB_USERNAME" --password-stdin

      - name: Build and push immutable image
        id: build-image
        run: |
          set -euo pipefail

          mkdir -p build/release
          {
            echo "image=$IMAGE_REPOSITORY"
            echo "immutable_tag=$IMMUTABLE_TAG"
            echo "moving_tag=$MOVING_TAG"
          } > build/release/image-tags.env

          docker buildx build \
            --pull \
            --platform linux/amd64 \
            --label "org.opencontainers.image.source=https://github.com/$GITHUB_REPOSITORY" \
            --label "org.opencontainers.image.revision=$GITHUB_SHA" \
            --label "org.opencontainers.image.ref.name=$GITHUB_REF_NAME" \
            --attest type=provenance,mode=max \
            --attest type=sbom \
            --metadata-file build/release/build-metadata.json \
            --push \
            --tag "$IMAGE_REPOSITORY:$IMMUTABLE_TAG" \
            --tag "$IMAGE_REPOSITORY:$MOVING_TAG" \
            .

          image_digest="$(jq -r '."containerimage.digest" // empty' build/release/build-metadata.json)"
          if [ -z "$image_digest" ] || [ "$image_digest" = "null" ]; then
            echo "::error::Docker Buildx did not return an image digest."
            exit 1
          fi

          echo "IMAGE_DIGEST=$image_digest" >> "$GITHUB_ENV"
          echo "image_digest=$image_digest" >> "$GITHUB_OUTPUT"
          echo "image_ref=$IMAGE_REPOSITORY@$image_digest" >> "$GITHUB_OUTPUT"
          echo "$IMAGE_REPOSITORY@$image_digest" > build/release/image-digest.txt
          echo "digest=$image_digest" >> build/release/image-tags.env

      - name: Capture pushed image metadata
        run: |
          set -euo pipefail
          docker buildx imagetools inspect "$IMAGE_REPOSITORY@$IMAGE_DIGEST" > build/release/image-inspect.txt
          docker buildx imagetools inspect --raw "$IMAGE_REPOSITORY@$IMAGE_DIGEST" > build/release/image-manifest.json

      # aquasecurity/trivy-action@v0.32.0
      - name: Vulnerability, secret, and config scan
        id: trivy-vulnerability
        uses: aquasecurity/trivy-action@dc5a429b52fcf669ce959baa2c2dd26090d2a6c4
        continue-on-error: true
        with:
          scan-type: image
          image-ref: ${{ steps.build-image.outputs.image_ref }}
          scanners: vuln,secret,misconfig
          severity: ${{ inputs.vulnerability_gate == 'critical' && 'CRITICAL' || 'HIGH,CRITICAL' }}
          ignore-unfixed: true
          format: sarif
          output: build/release/trivy-image.sarif
          exit-code: ${{ inputs.vulnerability_gate == 'advisory' && '0' || '1' }}

      # aquasecurity/trivy-action@v0.32.0
      - name: Generate CycloneDX SBOM
        id: trivy-sbom
        uses: aquasecurity/trivy-action@dc5a429b52fcf669ce959baa2c2dd26090d2a6c4
        with:
          scan-type: image
          image-ref: ${{ steps.build-image.outputs.image_ref }}
          format: cyclonedx
          output: build/release/sbom.cdx.json

      # aquasecurity/trivy-action@v0.32.0
      - name: Advisory license scan
        id: trivy-license
        uses: aquasecurity/trivy-action@dc5a429b52fcf669ce959baa2c2dd26090d2a6c4
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          scanners: license
          format: table
          output: build/release/trivy-license.txt
          exit-code: '0'

      - name: Build provenance predicate
        run: |
          set -euo pipefail
          jq -n \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg workflow "$GITHUB_WORKFLOW" \
            --arg ref "$GITHUB_REF" \
            --arg sha "$GITHUB_SHA" \
            --arg run_id "$GITHUB_RUN_ID" \
            --arg run_attempt "$GITHUB_RUN_ATTEMPT" \
            --arg actor "$GITHUB_ACTOR" \
            --arg environment "${{ inputs.environment }}" \
            --arg image "$IMAGE_REPOSITORY@$IMAGE_DIGEST" \
            --arg immutable_tag "$IMAGE_REPOSITORY:$IMMUTABLE_TAG" \
            --arg moving_tag "$IMAGE_REPOSITORY:$MOVING_TAG" \
            '{
              buildDefinition: {
                buildType: "https://github.com/Guisardo/firefly-iii/.github/workflows/docker-publish.yml",
                externalParameters: {
                  repository: $repository,
                  workflow: $workflow,
                  ref: $ref,
                  sha: $sha,
                  environment: $environment,
                  image: $image,
                  tags: [$immutable_tag, $moving_tag]
                },
                internalParameters: {}
              },
              runDetails: {
                builder: { id: "https://github.com/actions/runner/github-hosted" },
                metadata: {
                  invocationId: ("https://github.com/" + $repository + "/actions/runs/" + $run_id + "/attempts/" + $run_attempt)
                },
                byproducts: [
                  { name: "build/release/build-metadata.json" },
                  { name: "build/release/sbom.cdx.json" },
                  { name: "build/release/trivy-image.sarif" }
                ]
              },
              actor: $actor
            }' > build/release/provenance-predicate.json

      # sigstore/cosign-installer@v3.9.2
      - name: Install Cosign
        if: steps.trivy-vulnerability.outcome == 'success'
        uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159

      - name: Sign image and attach attestations
        if: steps.trivy-vulnerability.outcome == 'success'
        run: |
          set -euo pipefail
          image_ref="$IMAGE_REPOSITORY@$IMAGE_DIGEST"

          cosign sign --yes "$image_ref"
          cosign attest --yes --type cyclonedx --predicate build/release/sbom.cdx.json "$image_ref"
          cosign attest --yes --type slsaprovenance --predicate build/release/provenance-predicate.json "$image_ref"

      - name: Verify signature and attestations
        if: steps.trivy-vulnerability.outcome == 'success'
        run: |
          set -euo pipefail
          image_ref="$IMAGE_REPOSITORY@$IMAGE_DIGEST"
          identity_regexp="^https://github.com/${GITHUB_REPOSITORY}/.github/workflows/docker-publish.yml@${GITHUB_REF}$"

          cosign verify \
            --certificate-identity-regexp "$identity_regexp" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "$image_ref" > build/release/cosign-signature-verify.txt

          cosign verify-attestation \
            --type cyclonedx \
            --certificate-identity-regexp "$identity_regexp" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "$image_ref" > build/release/cosign-sbom-verify.txt

          cosign verify-attestation \
            --type slsaprovenance \
            --certificate-identity-regexp "$identity_regexp" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "$image_ref" > build/release/cosign-provenance-verify.txt

      - name: Write release evidence summary
        if: always()
        env:
          TRIVY_VULNERABILITY_OUTCOME: ${{ steps.trivy-vulnerability.outcome }}
          TRIVY_LICENSE_OUTCOME: ${{ steps.trivy-license.outcome }}
        run: |
          set -euo pipefail
          {
            echo "# Shared-admin Docker image evidence"
            echo
            echo "- Image: \`$IMAGE_REPOSITORY@${IMAGE_DIGEST:-unknown}\`"
            echo "- Immutable tag: \`$IMAGE_REPOSITORY:$IMMUTABLE_TAG\`"
            echo "- Moving tag: \`$IMAGE_REPOSITORY:$MOVING_TAG\`"
            echo "- Ref: \`$GITHUB_REF\`"
            echo "- Commit: \`$GITHUB_SHA\`"
            echo "- Environment: \`${{ inputs.environment }}\`"
            echo "- Vulnerability gate: \`${{ inputs.vulnerability_gate }}\`"
            echo "- Vulnerability scan outcome: \`$TRIVY_VULNERABILITY_OUTCOME\`"
            echo "- License scan outcome: \`$TRIVY_LICENSE_OUTCOME\`"
          } > build/release/release-evidence.md

          cat build/release/release-evidence.md >> "$GITHUB_STEP_SUMMARY"

      # actions/upload-artifact@v4
      - name: Upload release evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: shared-admin-image-release-${{ github.sha }}
          path: build/release
          if-no-files-found: error
          retention-days: 30

      - name: Enforce vulnerability gate
        if: always()
        env:
          TRIVY_VULNERABILITY_OUTCOME: ${{ steps.trivy-vulnerability.outcome }}
        run: |
          set -euo pipefail
          if [ "$TRIVY_VULNERABILITY_OUTCOME" != "success" ]; then
            echo "::error::Image vulnerability/secret/config gate failed. See trivy-image.sarif artifact."
            exit 1
          fi
